name: deploy

on:
  push:
    branches: [master]
  schedule:
    - cron: "0 3 * * *" # daily 03:00 UTC = midnight Brasília; flips the photo embargo on opening day
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - run: python3 build.py
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
